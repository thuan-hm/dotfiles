# =========================
# PREFIX
# =========================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =========================
# MOUSE
# =========================
set -g mouse on

# =========================
# STATUS BAR BASE
# =========================
set -g status on
set -g status-position bottom
set -g status-justify left

set -g status-style 'bg=#1d2021 fg=#ebdbb2'

# Disable right side completely
set -g status-right ""
set -g status-right-length 0

# IMPORTANT: kill default window list (fix "thừa 1 cái")
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# =========================
# LEFT STATUS (Session + Window + Host)
# =========================
set -g status-left "\
#[fg=#1d2021,bg=#83a598,bold] #S \
#[fg=#83a598,bg=#b8bb26] \
#[fg=#1d2021,bg=#b8bb26,bold] #W \
#[fg=#b8bb26,bg=#fabd2f] \
#[fg=#1d2021,bg=#fabd2f,bold] #H \
#[fg=#fabd2f,bg=#3c3836]"
set -g status-left-length 200

# =========================
# INDEXING
# =========================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =========================
# TERMINAL / PERFORMANCE
# =========================
set -g history-limit 10000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0

# =========================
# PANES STYLE
# =========================
set -g pane-border-style 'fg=#3c3836'
set -g pane-active-border-style 'fg=#83a598'

set -g message-style 'fg=#fabd2f bg=default bold'

# =========================
# SPLIT PANES
# =========================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =========================
# RELOAD CONFIG
# =========================
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# =========================
# NAVIGATION (VIM STYLE)
# =========================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =========================
# WORKSPACE LAYOUT
# =========================
bind W split-window -h -c "#{pane_current_path}" \; \
       send-keys 'claude' C-m \; \
       split-window -v -c "#{pane_current_path}" \; \
       send-keys 'clear' C-m \; \
       select-pane -L \; \
       resize-pane -R 30
