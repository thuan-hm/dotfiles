# Prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Status bar (Gruvbox Material) - Everything on LEFT
set -g status-position bottom
set -g status-style 'bg=#1d2021 fg=#ebdbb2'

# Disable right side
set -g status-right ''
set -g status-right-length 0

# All status on the left: session + windows + host
set -g status-left "\
#[fg=#1d2021,bg=#83a598,bold] #S\
#[fg=#83a598,bg=#b8bb26]\
#[fg=#1d2021,bg=#b8bb26,bold] #H\
#[fg=#b8bb26,bg=#3c3836]\
#{window_status}"
set -g status-left-length 200

# Window format (Gruvbox)
set -g window-status-format "\
#[fg=#a89984,bg=#3c3836] #I:#W \
#[fg=#3c3836,bg=#1d2021]"

set -g window-status-current-format "\
#[fg=#1d2021,bg=#fabd2f,bold] #I:#W \
#[fg=#fabd2f,bg=#1d2021]"

# Start index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# History and colors
set -g history-limit 10000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0

# Pane borders (Gruvbox)
set -g pane-border-style 'fg=#3c3836'
set -g pane-active-border-style 'fg=#83a598'

# Message styling
set -g message-style 'fg=#fabd2f bg=default bold'

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Workspace layout: 2/3 left | 1/3 right (Claude Code top, terminal bottom)
bind W split-window -h -c "#{pane_current_path}" \; \
       send-keys 'claude' C-m \; \
       split-window -v -c "#{pane_current_path}" \; \
       send-keys 'clear' C-m \; \
       select-pane -L \; \
       resize-pane -R 30
